services:
  - type: web
    name: star-office-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python backend/app.py
    envVars:
      - key: STAR_BACKEND_PORT
        value: 10000
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: STAR_OFFICE_SECRET
        generateValue: true
